<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | KDTech</title>

    <link rel="stylesheet" href="/CSS/contact.css">
</head>
<body>

    <button id="back-btn" class="back-btn">←</button>

    <section class="contact" >
        <div class="contact_container">
            <h1>Contact</h1>

            <form action="" id="contact-form" novalidate>

                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required minlength="2">
                    <span class="error" data-error="name"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="text" id="email" name="email" required>
                    <span class="error" data-error="email"></span>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="10" required minlength="10"></textarea>
                    <span class="error" data-error="message"></span>
                </div>

                <button type="submit">Send Message</button>

            </form>
        </div>
    </section>
    
    <script type="module" src="/JS/core/validation.js"></script>
    <script type="module" src="/JS/core/contact.js"></script>
</body>
</html>
